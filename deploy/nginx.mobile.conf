# nginx.mobile.conf
# Serves the Expo static web export for the Ghayth ERP mobile app under /mobile/.
# Used by Dockerfile.mobile. The main web container proxies /mobile/ here.
#
# The dist tree is copied to /usr/share/nginx/html/mobile, so the absolute asset
# URLs the export emits (/mobile/_expo/..., /mobile/favicon.ico) resolve directly
# from disk. expo-router runs as a single-page app: every unknown /mobile/* path
# falls back to the one index.html so deep links + browser refresh work.

gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_types application/javascript application/json application/xml image/svg+xml text/css text/javascript text/plain;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Canonicalise the bare path to the trailing-slash form the assets assume.
    location = /mobile {
        return 301 /mobile/;
    }

    # index.html references the current hashed chunk filenames; never cache it or
    # a stale copy 404s on chunks after a redeploy. Exact match beats the asset
    # regex below, and SPA-fallback internal redirects re-enter this block.
    location = /mobile/index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Content-hashed, immutable Expo assets.
    location ~* ^/mobile/.+\.(js|css|woff2?|ttf|eot|otf|png|jpg|jpeg|gif|svg|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SPA fallback for expo-router deep links + refresh.
    location /mobile/ {
        try_files $uri /mobile/index.html;
    }

    server_tokens off;
}
