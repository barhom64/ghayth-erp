# docker-compose.prod.yml
# Production-oriented single-node VPS stack for Ghayth ERP.
# Use with: docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ghayth_internal
    # Do not expose PostgreSQL publicly in production.

  api:
    build:
      context: .
      dockerfile: Dockerfile.api-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      NODE_ENV: production
      PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS must be set}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:?FIELD_ENCRYPTION_KEY must be set}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY:?SECRETS_ENCRYPTION_KEY must be set}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL must be set}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      STORAGE_LOCAL_DIR: ${STORAGE_LOCAL_DIR:-/var/lib/ghayth/storage}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      AI_INTEGRATIONS_ANTHROPIC_API_KEY: ${AI_INTEGRATIONS_ANTHROPIC_API_KEY:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID:-}
      SEED_DEMO_DATA: "false"
      PERSIST_ALL_EVENTS: ${PERSIST_ALL_EVENTS:-true}
    volumes:
      - app_storage:/var/lib/ghayth/storage
    expose:
      - "8080"
    networks:
      - ghayth_internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    networks:
      - ghayth_internal

  # Mobile app served as a same-origin static web export under /mobile/.
  # Kept as its OWN image/service (not folded into `web`) so a mobile build
  # failure never takes down the main web UI. The web nginx proxies /mobile/
  # here at request time via Docker DNS, so this being down only 502s /mobile/.
  mobile:
    build:
      context: .
      dockerfile: Dockerfile.mobile
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - ghayth_internal

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_UPSTREAM: http://api:8080
    ports:
      - "127.0.0.1:8088:80"
    networks:
      - ghayth_internal

volumes:
  pgdata:
  redisdata:
  app_storage:

networks:
  ghayth_internal:
    driver: bridge
