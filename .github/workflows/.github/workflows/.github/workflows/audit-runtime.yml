name: audit-runtime

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DATABASE_URL: postgres://ghayth:ghayth@localhost:5432/ghayth
      ADMIN_EMAIL: admin@ghayth.com
      ADMIN_PASSWORD: Admin@123456
      BASE_URL: http://localhost
      JWT_SECRET: ci-only-not-a-secret
      NODE_ENV: development
      HUSKY: '0'
      PORT: '5000'
      BASE_PATH: '/'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build frontend
        run: pnpm --filter ghayth-erp run build

      - name: Run runtime audit
        run: pnpm run audit:runtime

      - name: Upload runtime audit JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-audit-results
          path: |
            audit/runtime-audit-results.json
            /tmp/runtime-audit/all.json
          if-no-files-found: warn

      - name: Upload runtime audit screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-audit-screenshots
          path: audit/screenshots/
          if-no-files-found: warn
