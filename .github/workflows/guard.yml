name: guard

# Runs the same scripts/guard.sh stack that fires on every local commit
# via the .githooks/pre-commit hook. This is the last line of defence:
# even if a developer bypasses the local hook with --no-verify, this
# workflow will refuse to merge the PR if any guard is red.
#
# CI also provisions a disposable Postgres so the dynamic
# tenant-isolation harness (tests/integration/tenantIsolation.dynamic.test.ts)
# runs against a real database. The harness auto-skips when DATABASE_URL
# is absent, which is the dev-box default; the wiring below flips it on
# in CI by exporting DATABASE_URL + JWT_SECRET and pre-loading
# db/schema.sql into the postgres service container.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ghayth_erp
          POSTGRES_USER: ghayth_erp
          POSTGRES_PASSWORD: ghayth_erp
        ports:
          # Match the port the local docker-compose at
          # tests/integration/postgres/docker-compose.yml uses, so the
          # `_test`/`localhost:54329`/`127.0.0.1:54329` markers in
          # tests/integration/_fixtures/twoCompanies.ts (assertTestDatabase)
          # accept both CI and dev runs without code changes.
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U ghayth_erp -d ghayth_erp"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      # The dynamic tenant-isolation harness asserts that DATABASE_URL
      # contains a clear test marker before truncating tables — `54329`
      # is the agreed marker (see tests/integration/_fixtures/twoCompanies.ts).
      DATABASE_URL: postgres://ghayth_erp:ghayth_erp@127.0.0.1:54329/ghayth_erp
      # auth.ts refuses to load with a JWT_SECRET shorter than 32 chars.
      # This is a CI-only value, not a secret — it never authenticates a
      # production session.
      JWT_SECRET: ci-only-jwt-secret-thirty-two-chars-aaaaaaaaaaaaaaaa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # The root postinstall would try to set git hooks; harmless
          # inside Actions but we skip it explicitly to keep the log clean.
          HUSKY: '0'

      - name: Install postgres client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Load schema into test Postgres
        run: |
          set -euo pipefail
          # The postgres service container already created the role + DB
          # via POSTGRES_DB/POSTGRES_USER/POSTGRES_PASSWORD, so we skip
          # db/bootstrap.sh's sudo-driven role/DB management and just load
          # the schema dump directly via psql.
          #
          # db/schema.sql is a pg_dump 17 output that interleaves
          # `ALTER TABLE ... ADD CONSTRAINT FOREIGN KEY` blocks with
          # `CREATE TABLE` blocks rather than placing every FK in a
          # post-data section. On PG16 that ordering causes ~40 FKs to
          # reference tables / unique constraints that don't exist yet at
          # the moment the FK is created. We work around it with a 2-pass
          # load: pass 1 ignores those errors and creates everything else;
          # pass 2 replays only the `ALTER TABLE ... ADD CONSTRAINT` blocks,
          # at which point every referenced table and PK is in place. The
          # second pass logs "constraint already exists" / "multiple
          # primary keys" for blocks that pass 1 already applied — those
          # are expected and ignored.
          psql "$DATABASE_URL" -v ON_ERROR_STOP=0 -q -f db/schema.sql > /tmp/pass1.log 2>&1 || true
          python3 -c "import re; content=open('db/schema.sql').read(); blocks=re.findall(r'^ALTER TABLE[^;]*?;', content, re.MULTILINE | re.DOTALL); print('\n\n'.join(b for b in blocks if 'ADD CONSTRAINT' in b))" > /tmp/constraints.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=0 -q -f /tmp/constraints.sql > /tmp/pass2.log 2>&1 || true
          # Verify the schema is loaded fully — every FK named in the
          # dump must exist in the live DB. If anything is missing the
          # workflow fails loudly with both pass logs attached.
          expected_fks=$(grep -c 'FOREIGN KEY' db/schema.sql)
          actual_fks=$(psql "$DATABASE_URL" -tAc "SELECT count(*) FROM pg_constraint c JOIN pg_class r ON c.conrelid=r.oid JOIN pg_namespace n ON r.relnamespace=n.oid WHERE c.contype='f' AND n.nspname='public';")
          echo "Schema loaded: $actual_fks FKs (dump declares $expected_fks)"
          if [ "$actual_fks" -lt "$expected_fks" ]; then
            echo "FK shortfall — pass1.log:" >&2
            cat /tmp/pass1.log >&2
            echo "---- pass2.log:" >&2
            cat /tmp/pass2.log >&2
            exit 1
          fi
          # Mark every existing migration as already applied so the API
          # server (when imported by the dynamic test harness) doesn't try
          # to ALTER TABLE on a baseline that already has those columns.
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c \
            "CREATE TABLE IF NOT EXISTS schema_migrations (filename text PRIMARY KEY, applied_at timestamptz DEFAULT NOW());"
          for mig in artifacts/api-server/src/migrations/*.sql; do
            [ -f "$mig" ] || continue
            fn="$(basename "$mig")"
            psql "$DATABASE_URL" -q -c \
              "INSERT INTO schema_migrations(filename) VALUES ('$fn') ON CONFLICT DO NOTHING;"
          done

      - name: Run guard suite
        id: guard
        run: |
          set -o pipefail
          bash scripts/guard.sh 2>&1 | tee /tmp/guard-output.txt
        continue-on-error: true

      - name: Post failure details to PR
        if: steps.guard.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/guard-output.txt', 'utf8');
            const last200 = output.split('\n').slice(-200).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### CI guard failure\n\n<details><summary>Last 200 lines of guard output</summary>\n\n\`\`\`\n${last200}\n\`\`\`\n\n</details>`
            });

      - name: Fail if guard failed
        if: steps.guard.outcome == 'failure'
        run: exit 1

