name: guard

# Runs the same scripts/guard.sh stack that fires on every local commit
# via the .githooks/pre-commit hook. This is the last line of defence:
# even if a developer bypasses the local hook with --no-verify, this
# workflow will refuse to merge the PR if any guard is red.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # The root postinstall would try to set git hooks; harmless
          # inside Actions but we skip it explicitly to keep the log clean.
          HUSKY: '0'

      - name: Debug info
        if: always()
        run: |
          echo "Node: $(node -v)  pnpm: $(pnpm -v)  tsc: $(pnpm exec tsc --version)"
          echo "--- ls lib/db/dist (first 10) ---"
          ls lib/db/dist/ 2>&1 | head -10
          echo "--- ls lib/api-zod/dist (first 10) ---"
          ls lib/api-zod/dist/ 2>&1 | head -10

      - name: typecheck:libs (tsc --build)
        run: pnpm -s run typecheck:libs

      - name: typecheck:api-server
        run: pnpm -s --filter @workspace/api-server run typecheck

      - name: typecheck:remaining
        run: pnpm -r --filter "./artifacts/**" --filter "./scripts" --if-present run typecheck

      - name: lint:patterns
        run: pnpm -s run lint:patterns

      - name: audit:routes
        run: node scripts/src/audit-routes.mjs

      - name: audit:schema-drift
        run: node scripts/src/audit-schema-drift.mjs

      - name: audit:boundaries
        run: node scripts/src/audit-domain-boundaries.mjs

      - name: audit:domain-routes
        run: node scripts/src/audit-domain-routes.mjs

      - name: test
        run: pnpm -s --filter @workspace/api-server run test
