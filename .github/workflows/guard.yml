name: guard

# Runs the same scripts/guard.sh stack that fires on every local commit
# via the .githooks/pre-commit hook. This is the last line of defence:
# even if a developer bypasses the local hook with --no-verify, this
# workflow will refuse to merge the PR if any guard is red.
#
# CI also provisions a disposable Postgres so the dynamic
# tenant-isolation harness (tests/integration/tenantIsolation.dynamic.test.ts)
# runs against a real database. The harness auto-skips when DATABASE_URL
# is absent, which is the dev-box default; the wiring below flips it on
# in CI by exporting DATABASE_URL + JWT_SECRET and pre-loading
# db/schema.sql into the postgres service container.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ghayth_erp
          POSTGRES_USER: ghayth_erp
          POSTGRES_PASSWORD: ghayth_erp
        ports:
          # Match the port the local docker-compose at
          # tests/integration/postgres/docker-compose.yml uses, so the
          # `_test`/`localhost:54329`/`127.0.0.1:54329` markers in
          # tests/integration/_fixtures/twoCompanies.ts (assertTestDatabase)
          # accept both CI and dev runs without code changes.
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U ghayth_erp -d ghayth_erp"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      # The dynamic tenant-isolation harness asserts that DATABASE_URL
      # contains a clear test marker before truncating tables — `54329`
      # is the agreed marker (see tests/integration/_fixtures/twoCompanies.ts).
      DATABASE_URL: postgres://ghayth_erp:ghayth_erp@127.0.0.1:54329/ghayth_erp
      # auth.ts refuses to load with a JWT_SECRET shorter than 32 chars.
      # This is a CI-only value, not a secret — it never authenticates a
      # production session.
      JWT_SECRET: ci-only-jwt-secret-thirty-two-chars-aaaaaaaaaaaaaaaa
      # secrets.ts (AES-256-GCM at-rest encryption for vendor_secrets)
      # refuses to derive a key from nothing. CI-only value, same policy
      # as JWT_SECRET above — required by the #2137 systemSmtp dynamic
      # suite which round-trips an encrypted SMTP password.
      SECRETS_ENCRYPTION_KEY: ci-only-secrets-key-thirty-two-chars-aaaaaaaaaaaa

    steps:
      - name: Diagnostic — confirm job reached runner
        run: |
          echo "=== reached runner ==="
          echo "Job started at: $(date -u +%FT%TZ)"
          echo "Runner OS: $RUNNER_OS"
          echo "Workspace: $GITHUB_WORKSPACE"
          uname -a

      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnostic — after checkout
        run: |
          echo "=== checkout done ==="
          git log -1 --oneline
          ls -la | head -10

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        # `--ignore-scripts` skips the root preinstall whose `sh -c` subshell
        # doesn't always see $npm_config_user_agent under pnpm v10+, and the
        # postinstall (`install-hooks.sh`) which is meaningless inside the
        # Actions container anyway. Guard only needs dependencies on disk, not
        # lifecycle hooks fired.
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          HUSKY: '0'

      - name: Install postgres client
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Load schema into test Postgres
        run: |
          set -euo pipefail
          # The postgres service container already created the role + DB
          # via POSTGRES_DB/POSTGRES_USER/POSTGRES_PASSWORD, so we skip
          # db/bootstrap.sh's sudo-driven role/DB management and just load
          # the schema dump directly via psql.
          #
          # The dump was regenerated 2026-05-10 with `bash db/dump-schema.sh`
          # on Replit. To stay under the Replit GitHub proxy's 800 KB
          # per-file limit it is split into:
          #
          #   db/schema_pre.sql   — DROP CONSTRAINT/INDEX, DROP TABLE, CREATE TABLE
          #   db/schema_post.sql  — ALTER TABLE … ADD CONSTRAINT (PK/FK), CREATE INDEX
          #   db/schema.sql       — psql wrapper that `\ir`s the two halves
          #
          # The wrapper is convenient locally but cannot be used in this
          # workflow: pg_dump 17 emits `\restrict <token>` at the top of
          # `schema_pre.sql` (a security feature), which puts psql into a
          # mode that blocks all subsequent backslash commands — including
          # the wrapper's `\ir schema_post.sql`. So a single
          # `psql -f db/schema.sql` loads the tables (312) but no FKs/indexes.
          #
          # Instead we load the two halves with separate psql invocations,
          # which both start in unrestricted mode. Pass on schema_post uses
          # ON_ERROR_STOP=0 because the dump's trailing `\unrestrict` line
          # errors when the session isn't in restricted mode (harmless —
          # all DDL above it has already executed). The FK count assertion
          # below confirms the load actually succeeded.
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -q -f db/schema_pre.sql > /tmp/pre.log 2>&1
          psql "$DATABASE_URL" -v ON_ERROR_STOP=0 -q -f db/schema_post.sql > /tmp/post.log 2>&1 || true
          # Verify the schema is loaded fully — every FK named in the
          # dump must exist in the live DB.
          expected_fks=$(grep -c 'FOREIGN KEY' db/schema_post.sql)
          actual_fks=$(psql "$DATABASE_URL" -tAc "SELECT count(*) FROM pg_constraint c JOIN pg_class r ON c.conrelid=r.oid JOIN pg_namespace n ON r.relnamespace=n.oid WHERE c.contype='f' AND n.nspname='public';")
          echo "Schema loaded: $actual_fks FKs (dump declares $expected_fks)"
          if [ "$actual_fks" -lt "$expected_fks" ]; then
            echo "FK shortfall — pre.log:" >&2
            cat /tmp/pre.log >&2
            echo "---- post.log:" >&2
            cat /tmp/post.log >&2
            exit 1
          fi
          # Bring the test DB to HEAD before guard runs its schema-contract
          # checks. The dump (db/schema_*.sql) is a point-in-time baseline that
          # LAGS newer migrations. Previously we marked EVERY migration applied
          # WITHOUT running the post-baseline ones, so the DB stayed at the dump
          # level and check:insert-columns / check:update-columns ran against a
          # STALE schema — letting column drift from later migrations slip
          # through (the recruitment hire-flow broke exactly this way, #2776:
          # it wrote columns a post-dump migration had removed, yet guard was
          # green because its DB still had them). Now we ACTUALLY APPLY
          # post-cutoff migrations (idempotent: ADD COLUMN IF NOT EXISTS /
          # ON CONFLICT — proven by scripts/provision-agent-db.sh, which reaches
          # 413/413 over this same dump), THEN mark every file applied so the
          # api-server boot (dynamic harness) doesn't re-run them.
          CUTOFF="$(grep -vE '^#|^[[:space:]]*$' db/.baseline-cutoff | head -1)"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c \
            "CREATE TABLE IF NOT EXISTS schema_migrations (filename text PRIMARY KEY, applied_at timestamptz DEFAULT NOW());"
          for mig in $(ls artifacts/api-server/src/migrations/*.sql | sort -V); do
            [ -f "$mig" ] || continue
            fn="$(basename "$mig")"
            # Numeric-aware post-cutoff test (matches src/lib/migrate.ts): the
            # cutoff sorts strictly before a post-cutoff filename. ON_ERROR_STOP=0
            # makes psql tolerate benign idempotent-re-apply SQL errors (exit 0)
            # while still failing the step on a real connection error — so no
            # `|| true` mask is needed.
            if [ "$fn" != "$CUTOFF" ] && [ "$(printf '%s\n%s\n' "$CUTOFF" "$fn" | sort -V | tail -1)" = "$fn" ]; then
              psql "$DATABASE_URL" -v ON_ERROR_STOP=0 -q -f "$mig" >> /tmp/migrate.log 2>&1
            fi
            psql "$DATABASE_URL" -q -c \
              "INSERT INTO schema_migrations(filename) VALUES ('$fn') ON CONFLICT DO NOTHING;"
          done

      - name: Run guard suite
        id: guard
        run: |
          set -o pipefail
          bash scripts/guard.sh 2>&1 | tee /tmp/guard-output.txt
        continue-on-error: true

      - name: Post failure details to PR
        if: steps.guard.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/guard-output.txt', 'utf8');
            const last200 = output.split('\n').slice(-200).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### CI guard failure\n\n<details><summary>Last 200 lines of guard output</summary>\n\n\`\`\`\n${last200}\n\`\`\`\n\n</details>`
            });

      - name: Post commit status for ruleset gate
        # The repository ruleset requires a commit *status* named "guard"
        # (not just the check run GitHub Actions posts automatically).
        # Posts to both context.sha and the PR head SHA so the gate is
        # satisfied regardless of which commit the ruleset evaluates.
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.guard.outcome }}';
            const state   = outcome === 'success' ? 'success' : 'failure';
            const desc    = state === 'success' ? 'All guards passed' : 'Guard suite failed — see details';
            const url     = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shas = [...new Set([
              context.sha,
              context.payload.pull_request?.head?.sha,
            ].filter(Boolean))];
            for (const sha of shas) {
              await github.rest.repos.createCommitStatus({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                sha,
                state,
                context:     'guard',
                description: desc,
                target_url:  url,
              });
            }

      - name: Fail if guard failed
        if: steps.guard.outcome == 'failure'
        run: exit 1

