name: lighthouse

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse-contract:
    name: Lighthouse performance contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify performance budget contract
        run: |
          set -euo pipefail
          grep -q 'LCP' docs/ux/UX_SCORECARD.md
          grep -q 'INP' docs/ux/UX_SCORECARD.md
          grep -q 'CLS' docs/ux/UX_SCORECARD.md
          echo 'Performance acceptance contract exists.'

      - name: Optional Lighthouse CI against deployed/staging URL
        env:
          UX_BASE_URL: ${{ vars.UX_BASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${UX_BASE_URL:-}" ]; then
            echo '::notice::Set repository variable UX_BASE_URL to run live Lighthouse CI against staging.'
            exit 0
          fi
          cat > lighthouserc.json <<JSON
          {
            "ci": {
              "collect": {
                "url": ["${UX_BASE_URL}"],
                "numberOfRuns": 1
              },
              "assert": {
                "assertions": {
                  "categories:performance": ["warn", {"minScore": 0.75}],
                  "largest-contentful-paint": ["warn", {"maxNumericValue": 2500}],
                  "cumulative-layout-shift": ["warn", {"maxNumericValue": 0.1}],
                  "total-blocking-time": ["warn", {"maxNumericValue": 300}]
                }
              },
              "upload": {"target": "temporary-public-storage"}
            }
          }
          JSON
          npx --yes @lhci/cli autorun

      - name: Write Lighthouse summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'MD'
          ## Lighthouse — نظام غيث

          - ميزانية الأداء موثقة في `docs/ux/UX_SCORECARD.md`.
          - الفحص الحي يعمل عند ضبط Repository Variable باسم `UX_BASE_URL` على رابط staging.
          - للصفحات المصادق عليها، يتم الاعتماد على مسار `e2e` لتشغيل البيئة داخليًا ثم يمكن لاحقًا إضافة collect داخلي بعد تثبيت LHCI في ملف القفل.
          MD
