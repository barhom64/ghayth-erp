kind = "web"
previewPath = "/careers/"
title = "بوابة التوظيف — Careers Portal"
version = "1.0.0"
id = "artifacts/careers-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/careers/" ]
localPort = 23179

[services.development]
run = "pnpm --filter @workspace/careers-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/careers-portal", "run", "build" ]
publicDir = "artifacts/careers-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23179"
BASE_PATH = "/careers/"
