<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Ghayth brand mark: stylised cloud + ascending sound bars + "غيث" wordmark.
       Mirrors the multicolor (ملون) variant from the brand sheet:
       teal gradient cloud, dark navy bars + wordmark. -->
  <defs>
    <linearGradient id="g-cloud" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3FBFD9"/>
      <stop offset="100%" stop-color="#0F3D5C"/>
    </linearGradient>
  </defs>

  <!-- Cloud outline (rounded humps) -->
  <path d="M58 80
           a18 18 0 0 1 36 -10
           a22 22 0 0 1 32 5
           a16 16 0 0 1 14 32
           h-82
           a18 18 0 0 1 0 -27 z"
        stroke="url(#g-cloud)" stroke-width="6" fill="none"
        stroke-linejoin="round"/>

  <!-- Ascending sound bars (Ghayth frequency mark) — dark navy -->
  <g fill="#0F3D5C">
    <rect x="74"  y="72" width="6" height="32" rx="3"/>
    <rect x="86"  y="60" width="6" height="44" rx="3"/>
    <rect x="98"  y="50" width="6" height="54" rx="3"/>
    <rect x="110" y="60" width="6" height="44" rx="3"/>
    <rect x="122" y="72" width="6" height="32" rx="3"/>
  </g>

  <!-- Arabic wordmark "غيث" -->
  <text x="100" y="148" text-anchor="middle"
        font-family="'Noto Naskh Arabic','Tahoma',sans-serif"
        font-size="34" font-weight="700" fill="#0F3D5C"
        direction="rtl">غيث</text>

  <!-- Latin wordmark "GHAITH" -->
  <text x="100" y="178" text-anchor="middle"
        font-family="'Inter','Segoe UI',sans-serif"
        font-size="14" font-weight="600" letter-spacing="3"
        fill="#3FBFD9">GHAITH</text>
</svg>
