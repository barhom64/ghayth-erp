kind = "slides"
previewPath = "/ghayth-erp-deck/"
title = "عرض غيث ERP — للمدير العام"
version = "1.0.0"
id = "artifacts/ghayth-erp-deck"
router = "path"

[[integratedSkills]]
name = "slides"
