openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Ghayth ERP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: dashboard
  - name: employees
  - name: clients
  - name: hr
  - name: finance
  - name: notifications
  - name: tasks

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── Auth ──────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ─── Dashboard ─────────────────────────────────────────────
  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard stats
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get quick stats summary
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ─── Employees ─────────────────────────────────────────────
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List employees
      security: [{ bearerAuth: [] }]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create employee
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeBody"
      responses:
        "200":
          description: Created employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEmployeeResponse"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get employee by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDetail"

  # ─── Clients ───────────────────────────────────────────────
  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List clients
      security: [{ bearerAuth: [] }]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: classification
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create client
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "200":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClientResponse"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get client by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  # ─── HR ────────────────────────────────────────────────────
  /hr/check-in:
    post:
      operationId: checkIn
      tags: [hr]
      summary: Record attendance check-in
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInBody"
      responses:
        "200":
          description: Check-in result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInResponse"

  /hr/attendance:
    get:
      operationId: getAttendance
      tags: [hr]
      summary: Get attendance records
      security: [{ bearerAuth: [] }]
      parameters:
        - name: month
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /hr/leave-types:
    get:
      operationId: listLeaveTypes
      tags: [hr]
      summary: List leave types
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Leave types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveType"

  /hr/leave-balance:
    get:
      operationId: getLeaveBalance
      tags: [hr]
      summary: Get leave balances
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Leave balances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveBalance"

  /hr/leave-requests:
    get:
      operationId: listLeaveRequests
      tags: [hr]
      summary: List leave requests
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Leave requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveRequest"
    post:
      operationId: requestLeave
      tags: [hr]
      summary: Submit leave request
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestLeaveBody"
      responses:
        "200":
          description: Leave request result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestLeaveResponse"

  /hr/leave-requests/{id}/approve:
    post:
      operationId: approveLeave
      tags: [hr]
      summary: Approve or reject leave request
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveLeaveBody"
      responses:
        "200":
          description: Approval result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /hr/payroll:
    get:
      operationId: listPayrollRuns
      tags: [hr]
      summary: List payroll runs
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Payroll runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PayrollRun"
    post:
      operationId: runPayroll
      tags: [hr]
      summary: Run payroll for a period
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunPayrollBody"
      responses:
        "200":
          description: Payroll run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollRunResult"

  # ─── Finance ───────────────────────────────────────────────
  /finance/invoices:
    get:
      operationId: listInvoices
      tags: [finance]
      summary: List invoices
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [finance]
      summary: Create invoice
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceBody"
      responses:
        "200":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInvoiceResponse"

  /finance/invoices/{id}/payment:
    post:
      operationId: recordPayment
      tags: [finance]
      summary: Record invoice payment
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordPaymentBody"
      responses:
        "200":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"

  /finance/chart-of-accounts:
    get:
      operationId: getChartOfAccounts
      tags: [finance]
      summary: Get chart of accounts
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Chart of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"

  /finance/stats:
    get:
      operationId: getFinanceStats
      tags: [finance]
      summary: Get finance statistics
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Finance stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceStats"

  # ─── Notifications ─────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ─── Tasks ─────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Tasks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        assignments:
          type: array
          items:
            type: object
      required: [token, assignments]

    UserProfile:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        photoUrl:
          type: string
        jobTitle:
          type: string
        role:
          type: string
        salary:
          type: number
        companyName:
          type: string
        branchName:
          type: string
      required: [name, role, companyName, branchName]

    DashboardData:
      type: object
      properties:
        cards:
          type: object
          properties:
            todayTasks:
              type: integer
            awaitingMe:
              type: integer
            overdue:
              type: integer
            completedPct:
              type: integer
        todayTasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        pendingApprovals:
          type: array
          items:
            type: object
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
      required: [cards, todayTasks, pendingApprovals, notifications]

    DashboardSummary:
      type: object
      properties:
        totalEmployees:
          type: integer
        totalClients:
          type: integer
        totalRevenue:
          type: number
        pendingInvoices:
          type: integer
        activeTasksToday:
          type: integer
        presentToday:
          type: integer
      required: [totalEmployees, totalClients, totalRevenue, pendingInvoices, activeTasksToday, presentToday]

    Employee:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        assignmentId:
          type: integer
        jobTitle:
          type: string
        role:
          type: string
        salary:
          type: number
        status:
          type: string
        empNumber:
          type: string
      required: [id, name, jobTitle, role, status]

    EmployeeDetail:
      allOf:
        - $ref: "#/components/schemas/Employee"
        - type: object
          properties:
            gender:
              type: string
            nationality:
              type: string
            hireDate:
              type: string
            departmentName:
              type: string
            branchName:
              type: string
            companyName:
              type: string

    CreateEmployeeBody:
      type: object
      properties:
        nationalId:
          type: string
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        gender:
          type: string
        nationality:
          type: string
        departmentId:
          type: integer
        jobTitle:
          type: string
        role:
          type: string
        salary:
          type: number
        hireDate:
          type: string
      required: [name, phone, jobTitle, hireDate]

    CreateEmployeeResponse:
      type: object
      properties:
        employeeId:
          type: integer
        assignmentId:
          type: integer
        empNumber:
          type: string
      required: [employeeId, assignmentId, empNumber]

    Client:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        classification:
          type: string
        source:
          type: string
        totalRevenue:
          type: number
        isBlacklisted:
          type: boolean
        assignedToName:
          type: string
        createdAt:
          type: string
      required: [id, classification]

    CreateClientBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        source:
          type: string
      required: [phone]

    CreateClientResponse:
      type: object
      properties:
        clientId:
          type: integer
        code:
          type: string
      required: [clientId, code]

    CheckInBody:
      type: object
      properties:
        lat:
          type: number
        lon:
          type: number
      required: [lat, lon]

    CheckInResponse:
      type: object
      properties:
        status:
          type: string
        lateMinutes:
          type: integer
        deduction:
          type: number
      required: [status]

    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        checkIn:
          type: string
        checkOut:
          type: string
        lateMinutes:
          type: integer
        status:
          type: string
      required: [id, date, status]

    LeaveType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        annualDays:
          type: integer
        isPaid:
          type: boolean
      required: [id, name, annualDays]

    LeaveBalance:
      type: object
      properties:
        leaveTypeId:
          type: integer
        leaveTypeName:
          type: string
        entitled:
          type: integer
        used:
          type: integer
        reserved:
          type: integer
        remaining:
          type: integer
      required: [leaveTypeId, entitled, used, remaining]

    LeaveRequest:
      type: object
      properties:
        id:
          type: integer
        leaveTypeId:
          type: integer
        leaveTypeName:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        days:
          type: integer
        status:
          type: string
        reason:
          type: string
        createdAt:
          type: string
      required: [id, startDate, endDate, days, status]

    RequestLeaveBody:
      type: object
      properties:
        leaveTypeId:
          type: integer
        startDate:
          type: string
        endDate:
          type: string
        reason:
          type: string
      required: [leaveTypeId, startDate, endDate]

    RequestLeaveResponse:
      type: object
      properties:
        requestId:
          type: integer
        days:
          type: integer
        status:
          type: string
      required: [requestId, days, status]

    ApproveLeaveBody:
      type: object
      properties:
        approved:
          type: boolean
        reason:
          type: string
      required: [approved]

    PayrollRun:
      type: object
      properties:
        id:
          type: integer
        period:
          type: string
        status:
          type: string
        totalNet:
          type: number
        employeeCount:
          type: integer
        createdAt:
          type: string
      required: [id, period, status, totalNet]

    RunPayrollBody:
      type: object
      properties:
        period:
          type: string
      required: [period]

    PayrollRunResult:
      type: object
      properties:
        runId:
          type: integer
        period:
          type: string
        totalNet:
          type: number
        employeeCount:
          type: integer
      required: [runId, period, totalNet, employeeCount]

    Invoice:
      type: object
      properties:
        id:
          type: integer
        ref:
          type: string
        clientName:
          type: string
        clientId:
          type: integer
        description:
          type: string
        subtotal:
          type: number
        vatRate:
          type: number
        vatAmount:
          type: number
        total:
          type: number
        paidAmount:
          type: number
        status:
          type: string
        dueDate:
          type: string
        createdAt:
          type: string
      required: [id, ref, total, status]

    CreateInvoiceBody:
      type: object
      properties:
        clientId:
          type: integer
        description:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              qty:
                type: number
              unitPrice:
                type: number
            required: [name, qty, unitPrice]
        dueInDays:
          type: integer
      required: [clientId, items]

    CreateInvoiceResponse:
      type: object
      properties:
        invoiceId:
          type: integer
        ref:
          type: string
        total:
          type: number
        dueDate:
          type: string
      required: [invoiceId, ref, total]

    RecordPaymentBody:
      type: object
      properties:
        amount:
          type: number
        method:
          type: string
      required: [amount, method]

    PaymentResponse:
      type: object
      properties:
        success:
          type: boolean
        newStatus:
          type: string
        totalPaid:
          type: number
      required: [success, newStatus, totalPaid]

    Account:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        type:
          type: string
      required: [id, code, name, type]

    FinanceStats:
      type: object
      properties:
        totalRevenue:
          type: number
        pendingAmount:
          type: number
        overdueAmount:
          type: number
        paidThisMonth:
          type: number
        invoicesByStatus:
          type: array
          items:
            type: object
      required: [totalRevenue, pendingAmount, overdueAmount, paidThisMonth]

    Notification:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        title:
          type: string
        body:
          type: string
        priority:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
      required: [id, type, title, isRead]

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        status:
          type: string
        priority:
          type: string
        scheduledStart:
          type: string
        clientName:
          type: string
        clientPhone:
          type: string
        createdAt:
          type: string
      required: [id, title, type, status, priority]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]
