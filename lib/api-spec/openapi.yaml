            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "200":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClientResponse"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
