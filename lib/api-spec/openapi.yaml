openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Ghayth ERP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: dashboard
  - name: employees
  - name: clients
  - name: hr
  - name: finance
  - name: notifications
  - name: tasks
  - name: projects
    description: |
      Projects domain — owns the `projects` table.
      Project creation MUST go through `POST /api/projects` (this tag).
      Finance UI screens (e.g. `project-costing`) must NOT call any
      `POST /api/finance/projects*` endpoint to create a project — that
      route was removed because it bypassed the projects domain
      (RBAC `projects.list:create`, manager assignment, delivery
      obligation registration, `project.created` event, audit log).
      Finance may freely call the read-side `GET /api/finance/projects*`
      and the costing endpoints `POST /api/finance/projects/:id/costs`.
  - name: umrah
    description: |
      Umrah workflow — pilgrimage operations.
      Only the endpoints introduced in PRs #303/#305/#306/#312/#318 are
      enumerated below; the legacy `/api/umrah/*` surface is large and
      will be back-filled in per-module follow-up PRs.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Liveness probe (lightweight)
      description: |
        Lightweight liveness check. Proves the process is up. Does NOT
        verify DB connectivity or schema completeness — use
        `GET /api/health/schema` for readiness verification.
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /health/schema:
    get:
      operationId: healthSchema
      tags: [health]
      summary: Schema/readiness verification
      description: |
        Readiness probe. Verifies that the expected tables/columns exist
        and that pending migrations have been applied. This is the
        endpoint that post-deploy verification scripts should poll —
        `/api/health` and `/api/healthz` only prove connectivity /
        liveness, not schema completeness.
      responses:
        "200":
          description: Schema reachable (see `ok` field for readiness verdict)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSchemaStatus"

  # ─── Auth ──────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  # ─── Dashboard ─────────────────────────────────────────────
  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard stats
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get quick stats summary
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ─── Employees ─────────────────────────────────────────────
  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List employees
      security: [{ bearerAuth: [] }]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create employee
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeBody"
      responses:
        "200":
          description: Created employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEmployeeResponse"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get employee by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDetail"

  # ─── Clients ───────────────────────────────────────────────
  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List clients
      security: [{ bearerAuth: [] }]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: classification
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create client
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "200":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateClientResponse"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get client by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  # ─── HR ────────────────────────────────────────────────────
  /hr/check-in:
    post:
      operationId: checkIn
      tags: [hr]
      summary: Record attendance check-in
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInBody"
      responses:
        "200":
          description: Check-in result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInResponse"

  /hr/attendance:
    get:
      operationId: getAttendance
      tags: [hr]
      summary: Get attendance records
      security: [{ bearerAuth: [] }]
      parameters:
        - name: month
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /hr/leave-types:
    get:
      operationId: listLeaveTypes
      tags: [hr]
      summary: List leave types
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Leave types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveType"

  /hr/leave-balance:
    get:
      operationId: getLeaveBalance
      tags: [hr]
      summary: Get leave balances
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Leave balances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveBalance"

  /hr/leave-requests:
    get:
      operationId: listLeaveRequests
      tags: [hr]
      summary: List leave requests
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Leave requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaveRequest"
    post:
      operationId: requestLeave
      tags: [hr]
      summary: Submit leave request
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestLeaveBody"
      responses:
        "200":
          description: Leave request result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestLeaveResponse"

  /hr/leave-requests/{id}/approve:
    post:
      operationId: approveLeave
      tags: [hr]
      summary: Approve or reject leave request
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveLeaveBody"
      responses:
        "200":
          description: Approval result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /hr/payroll:
    get:
      operationId: listPayrollRuns
      tags: [hr]
      summary: List payroll runs
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Payroll runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PayrollRun"
    post:
      operationId: runPayroll
      tags: [hr]
      summary: Run payroll for a period
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunPayrollBody"
      responses:
        "200":
          description: Payroll run result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollRunResult"

  # ─── Finance ───────────────────────────────────────────────
  /finance/invoices:
    get:
      operationId: listInvoices
      tags: [finance]
      summary: List invoices
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      tags: [finance]
      summary: Create invoice
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceBody"
      responses:
        "200":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInvoiceResponse"

  /finance/invoices/{id}/payment:
    post:
      operationId: recordPayment
      tags: [finance]
      summary: Record invoice payment
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordPaymentBody"
      responses:
        "200":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"

  /finance/chart-of-accounts:
    get:
      operationId: getChartOfAccounts
      tags: [finance]
      summary: Get chart of accounts
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Chart of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"

  /finance/stats:
    get:
      operationId: getFinanceStats
      tags: [finance]
      summary: Get finance statistics
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Finance stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceStats"

  # ─── Projects ──────────────────────────────────────────────
  /projects:
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project (canonical entrypoint)
      description: |
        The **only** supported way to create a project. Used by the
        projects module *and* by finance UI screens that need to spin up
        a new project (e.g. "إنشاء مشروع جديد" shortcut on
        `project-costing`). Enforces:
          - RBAC `projects.list:create` (or role `projects_manager`).
          - Manager assignment (auto-pinned to caller for `projects_manager`).
          - Delivery obligation registration on `endDate`.
          - `project.created` event + audit log.
        The historical `POST /api/finance/projects` was removed because
        it bypassed all of the above.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, startDate, endDate]
              properties:
                name: { type: string }
                description: { type: string }
                clientId: { type: integer, nullable: true }
                managerId: { type: integer, nullable: true }
                startDate: { type: string, format: date }
                endDate: { type: string, format: date }
                budget: { type: number, minimum: 0 }
                status:
                  type: string
                  enum: [planning, active, on_hold, completed, cancelled]
                  default: planning
                phases:
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name: { type: string }
                      startDate: { type: string, format: date }
                      endDate: { type: string, format: date }
      responses:
        "201":
          description: Project created
        "400":
          description: Validation error (missing name/dates, endDate <= startDate, invalid budget, unknown clientId/managerId)
        "403":
          description: Caller lacks `projects.list:create`

  # ─── Notifications ─────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ─── Tasks ─────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Tasks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  # ─────────────────────────────────────────────────────────────────────
  # Umrah — endpoints added by PRs #303, #305, #306, #312, #318
  # Legacy /api/umrah/* (seasons, agents, packages, pilgrims, ...) is not
  # yet enumerated here; follow-up PRs will back-fill the rest module
  # by module per CONTRIBUTING.md §3.5.
  # ─────────────────────────────────────────────────────────────────────

  /umrah/groups/{id}/split:
    post:
      operationId: splitUmrahGroup
      tags: [umrah]
      summary: Split a group into a new group (move N pilgrims)
      description: |
        Moves the listed pilgrims out of the source group into a fresh
        child group. Rejects 409 if the source group is already linked to
        a sales invoice (issue credit note first). agentId / subAgentId /
        seasonId / programDuration are inherited from the source.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pilgrimIds]
              properties:
                pilgrimIds:
                  type: array
                  items: { type: integer }
                newGroupName: { type: string }
                newNuskGroupNumber: { type: string }
      responses:
        "200":
          description: Split succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  newGroup:
                    type: object
                  movedCount: { type: integer }
        "404": { description: Source group not found }
        "409": { description: Source group is already invoiced }

  /umrah/groups/merge:
    post:
      operationId: mergeUmrahGroups
      tags: [umrah]
      summary: Merge multiple source groups into a target group
      description: |
        Moves every pilgrim from each source group into the target, then
        soft-deletes the now-empty source groups. Rejects 409 if any
        source is already invoiced. Idempotent on re-runs because
        deleted groups are skipped on subsequent calls.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceGroupIds, targetGroupId]
              properties:
                sourceGroupIds:
                  type: array
                  items: { type: integer }
                targetGroupId: { type: integer }
      responses:
        "200":
          description: Merge succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  movedCount: { type: integer }
                  mergedSourceIds:
                    type: array
                    items: { type: integer }
        "404": { description: Target group not found }
        "409": { description: One or more source groups invoiced }

  /umrah/penalties/waive-bulk:
    post:
      operationId: bulkWaiveUmrahPenalties
      tags: [umrah]
      summary: Waive multiple penalties under one reason
      description: |
        Loops each penaltyId through `applyTransition` +
        `postPenaltyWaiverGL`. A single bad row does not break the batch
        — failures + skips are reported back so the UI can render a
        non-atomic summary. Posts one consolidated reversal journal
        entry per successful row.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [penaltyIds, reason]
              properties:
                penaltyIds:
                  type: array
                  items: { type: integer }
                reason: { type: string }
      responses:
        "200":
          description: Bulk waive result
          content:
            application/json:
              schema:
                type: object
                properties:
                  successCount: { type: integer }
                  successIds:
                    type: array
                    items: { type: integer }
                  totalWaivedAmount: { type: number }
                  skipped:
                    type: array
                  errors:
                    type: array

  /umrah/attachments:
    get:
      operationId: listUmrahAttachments
      tags: [umrah]
      summary: List polymorphic attachments
      security: [{ bearerAuth: [] }]
      parameters:
        - name: entityType
          in: query
          schema:
            type: string
            enum: [mutamer, sub_agent, group, agent, nusk_invoice, season, sales_invoice, violation]
        - name: entityId
          in: query
          schema: { type: integer }
        - name: type
          in: query
          schema:
            type: string
            enum: [passport, visa, contract, nusk_file, identity, transfer_receipt, other]
      responses:
        "200":
          description: Filtered attachment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
    post:
      operationId: createUmrahAttachment
      tags: [umrah]
      summary: Attach a file to an umrah entity
      description: |
        Verifies ownership of the target row via an entityType→table
        whitelist before insert (no raw table-name injection). The
        attached file is described by metadata only; uploads go through
        the central storage service and `storageKey` + `fileUrl` are
        recorded here.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entityType, entityId, type, title]
              properties:
                entityType: { type: string }
                entityId: { type: integer }
                type: { type: string }
                title: { type: string }
                notes: { type: string }
                fileUrl: { type: string, format: uri }
                storageKey: { type: string }
                fileSize: { type: integer }
                mimeType: { type: string }
      responses:
        "201":
          description: Attachment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
        "404": { description: Owning entity not found }

  /umrah/attachments/{id}:
    delete:
      operationId: deleteUmrahAttachment
      tags: [umrah]
      summary: Soft-delete an attachment
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404": { description: Attachment not found }

  /umrah/reports/reconciliation:
    get:
      operationId: umrahReconciliationReport
      tags: [umrah]
      summary: NUSK file ↔ system reconciliation
      description: |
        Read-only diff across three dimensions:
          1. amountDiffs — nuskInvoice.totalAmount vs posted JE total
          2. countDiffs — nuskInvoice.mutamerCount vs actual pilgrims
          3. overstayGaps — pilgrims with overstayDays>0 and no open
             violation row
      security: [{ bearerAuth: [] }]
      parameters:
        - name: seasonId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Reconciliation findings
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                  amountDiffs: { type: array }
                  countDiffs:  { type: array }
                  overstayGaps: { type: array }

  /umrah/reports/daily-runsheet:
    get:
      operationId: umrahDailyRunsheet
      tags: [umrah]
      summary: Daily operations run-sheet (JSON)
      description: |
        Returns arrivals + departures for a given date plus everyone
        currently overstaying. Defaults to today (ISO yyyy-mm-dd).
        Companion PDF at `/umrah/reports/daily-runsheet/pdf`.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: date
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Run-sheet payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  date: { type: string, format: date }
                  arrivals: { type: array }
                  departures: { type: array }
                  overstays: { type: array }

  /umrah/reports/daily-runsheet/pdf:
    get:
      operationId: umrahDailyRunsheetPdf
      tags: [umrah]
      summary: Daily operations run-sheet (Arabic PDF)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: date
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /umrah/statements/{subAgentId}/pdf:
    get:
      operationId: umrahSubAgentStatementPdf
      tags: [umrah]
      summary: Sub-agent statement of account (Arabic PDF)
      description: |
        Detailed running-balance ledger (invoices + violations + payments
        with opening + closing balance), rendered as a printable PDF for
        WhatsApp / email / hand delivery.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: subAgentId
          in: path
          required: true
          schema: { type: integer }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    HealthSchemaStatus:
      type: object
      description: |
        Response from `GET /api/health/schema`. Readiness verdict for the
        DB schema — `ok: true` means expected tables/columns are present
        and migrations are in a consistent state. Additional diagnostic
        fields are returned by the implementation but intentionally not
        pinned here to avoid forcing schema churn on every internal
        change to the readiness check.
      properties:
        ok:
          type: boolean
        status:
          type: string
        checkedAt:
          type: string
          format: date-time
      required: [ok]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        assignments:
          type: array
          items:
            type: object
      required: [token, assignments]

    UserProfile:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        photoUrl:
          type: string
        jobTitle:
          type: string
        role:
          type: string
        salary:
          type: number
        companyName:
          type: string
        branchName:
          type: string
      required: [name, role, companyName, branchName]

    DashboardData:
      type: object
      properties:
        cards:
          type: object
          properties:
            todayTasks:
              type: integer
            awaitingMe:
              type: integer
            overdue:
              type: integer
            completedPct:
              type: integer
        todayTasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        pendingApprovals:
          type: array
          items:
            type: object
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
      required: [cards, todayTasks, pendingApprovals, notifications]

    DashboardSummary:
      type: object
      properties:
        totalEmployees:
          type: integer
        totalClients:
          type: integer
        totalRevenue:
          type: number
        pendingInvoices:
          type: integer
        activeTasksToday:
          type: integer
        presentToday:
          type: integer
      required: [totalEmployees, totalClients, totalRevenue, pendingInvoices, activeTasksToday, presentToday]

    Employee:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        assignmentId:
          type: integer
        jobTitle:
          type: string
        role:
          type: string
        salary:
          type: number
        status:
          type: string
        empNumber:
          type: string
      required: [id, name, jobTitle, role, status]

    EmployeeDetail:
      allOf:
        - $ref: "#/components/schemas/Employee"
        - type: object
          properties:
            gender:
              type: string
            nationality:
              type: string
            hireDate:
              type: string
            departmentName:
              type: string
            branchName:
              type: string
            companyName:
              type: string

    CreateEmployeeBody:
      type: object
      properties:
        nationalId:
          type: string
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        gender:
          type: string
        nationality:
          type: string
        departmentId:
          type: integer
        jobTitle:
          type: string
        role:
          type: string
        salary:
          type: number
        hireDate:
          type: string
      required: [name, phone, jobTitle, hireDate]

    CreateEmployeeResponse:
      type: object
      properties:
        employeeId:
          type: integer
        assignmentId:
          type: integer
        empNumber:
          type: string
      required: [employeeId, assignmentId, empNumber]

    Client:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        classification:
          type: string
        source:
          type: string
        totalRevenue:
          type: number
        isBlacklisted:
          type: boolean
        assignedToName:
          type: string
        createdAt:
          type: string
      required: [id, classification]

    CreateClientBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        source:
          type: string
      required: [phone]

    CreateClientResponse:
      type: object
      properties:
        clientId:
          type: integer
        code:
          type: string
      required: [clientId, code]

    CheckInBody:
      type: object
      properties:
        lat:
          type: number
        lon:
          type: number
      required: [lat, lon]

    CheckInResponse:
      type: object
      properties:
        status:
          type: string
        lateMinutes:
          type: integer
        deduction:
          type: number
      required: [status]

    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        checkIn:
          type: string
        checkOut:
          type: string
        lateMinutes:
          type: integer
        status:
          type: string
      required: [id, date, status]

    LeaveType:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        annualDays:
          type: integer
        isPaid:
          type: boolean
      required: [id, name, annualDays]

    LeaveBalance:
      type: object
      properties:
        leaveTypeId:
          type: integer
        leaveTypeName:
          type: string
        entitled:
          type: integer
        used:
          type: integer
        reserved:
          type: integer
        remaining:
          type: integer
      required: [leaveTypeId, entitled, used, remaining]

    LeaveRequest:
      type: object
      properties:
        id:
          type: integer
        leaveTypeId:
          type: integer
        leaveTypeName:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        days:
          type: integer
        status:
          type: string
        reason:
          type: string
        createdAt:
          type: string
      required: [id, startDate, endDate, days, status]

    RequestLeaveBody:
      type: object
      properties:
        leaveTypeId:
          type: integer
        startDate:
          type: string
        endDate:
          type: string
        reason:
          type: string
      required: [leaveTypeId, startDate, endDate]

    RequestLeaveResponse:
      type: object
      properties:
        requestId:
          type: integer
        days:
          type: integer
        status:
          type: string
      required: [requestId, days, status]

    ApproveLeaveBody:
      type: object
      properties:
        approved:
          type: boolean
        reason:
          type: string
      required: [approved]

    PayrollRun:
      type: object
      properties:
        id:
          type: integer
        period:
          type: string
        status:
          type: string
        totalNet:
          type: number
        employeeCount:
          type: integer
        createdAt:
          type: string
      required: [id, period, status, totalNet]

    RunPayrollBody:
      type: object
      properties:
        period:
          type: string
      required: [period]

    PayrollRunResult:
      type: object
      properties:
        runId:
          type: integer
        period:
          type: string
        totalNet:
          type: number
        employeeCount:
          type: integer
      required: [runId, period, totalNet, employeeCount]

    Invoice:
      type: object
      properties:
        id:
          type: integer
        ref:
          type: string
        clientName:
          type: string
        clientId:
          type: integer
        description:
          type: string
        subtotal:
          type: number
        vatRate:
          type: number
        vatAmount:
          type: number
        total:
          type: number
        paidAmount:
          type: number
        status:
          type: string
        dueDate:
          type: string
        createdAt:
          type: string
      required: [id, ref, total, status]

    CreateInvoiceBody:
      type: object
      properties:
        clientId:
          type: integer
        description:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              qty:
                type: number
              unitPrice:
                type: number
            required: [name, qty, unitPrice]
        dueInDays:
          type: integer
      required: [clientId, items]

    CreateInvoiceResponse:
      type: object
      properties:
        invoiceId:
          type: integer
        ref:
          type: string
        total:
          type: number
        dueDate:
          type: string
      required: [invoiceId, ref, total]

    RecordPaymentBody:
      type: object
      properties:
        amount:
          type: number
        method:
          type: string
      required: [amount, method]

    PaymentResponse:
      type: object
      properties:
        success:
          type: boolean
        newStatus:
          type: string
        totalPaid:
          type: number
      required: [success, newStatus, totalPaid]

    Account:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        type:
          type: string
      required: [id, code, name, type]

    FinanceStats:
      type: object
      properties:
        totalRevenue:
          type: number
        pendingAmount:
          type: number
        overdueAmount:
          type: number
        paidThisMonth:
          type: number
        invoicesByStatus:
          type: array
          items:
            type: object
      required: [totalRevenue, pendingAmount, overdueAmount, paidThisMonth]

    Notification:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        title:
          type: string
        body:
          type: string
        priority:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
      required: [id, type, title, isRead]

    Task:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
        status:
          type: string
        priority:
          type: string
        scheduledStart:
          type: string
        clientName:
          type: string
        clientPhone:
          type: string
        createdAt:
          type: string
      required: [id, title, type, status, priority]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]
