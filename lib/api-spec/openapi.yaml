    get:
      operationId: listEmployees
      tags: [employees]
      summary: List employees
      security: [{ bearerAuth: [] }]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Employee"
                  total:
                    type: integer
                  page:
                    type: integer
                  pageSize:
                    type: integer
                required: [data, total, page, pageSize]
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create employee
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
