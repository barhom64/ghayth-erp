          additionalProperties: true
        roles:
          type: array
          items:
            type: object
            additionalProperties: true
        contract:
          type: ["object", "null"]
          additionalProperties: true
        position:
          type: ["object", "null"]
          additionalProperties: true
        custodies:
          type: array
          items:
            type: object
            additionalProperties: true
        latestScore:
          type: ["object", "null"]
          additionalProperties: true
        activeSignals:
          type: array
          items:
            type: object
            additionalProperties: true
