  # ─────────────────────────────────────────────────────────────────────
  # Umrah — endpoints added by PRs #303, #305, #306, #312, #318
  # Legacy /api/umrah/* (seasons, agents, packages, pilgrims, ...) is not
  # yet enumerated here; follow-up PRs will back-fill the rest module
  # by module per CONTRIBUTING.md §3.5.
  # ─────────────────────────────────────────────────────────────────────

  /umrah/groups/{id}/split:
    post:
      operationId: splitUmrahGroup
      tags: [umrah]
      summary: Split a group into a new group (move N pilgrims)
      description: |
        Moves the listed pilgrims out of the source group into a fresh
        child group. Rejects 409 if the source group is already linked to
        a sales invoice (issue credit note first). agentId / subAgentId /
        seasonId / programDuration are inherited from the source.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pilgrimIds]
              properties:
                pilgrimIds:
                  type: array
                  items: { type: integer }
                newGroupName: { type: string }
                newNuskGroupNumber: { type: string }
      responses:
        "200":
          description: Split succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  newGroup:
                    type: object
                  movedCount: { type: integer }
        "404": { description: Source group not found }
        "409": { description: Source group is already invoiced }

  /umrah/groups/merge:
    post:
      operationId: mergeUmrahGroups
      tags: [umrah]
      summary: Merge multiple source groups into a target group
      description: |
        Moves every pilgrim from each source group into the target, then
        soft-deletes the now-empty source groups. Rejects 409 if any
        source is already invoiced. Idempotent on re-runs because
        deleted groups are skipped on subsequent calls.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceGroupIds, targetGroupId]
              properties:
                sourceGroupIds:
                  type: array
                  items: { type: integer }
                targetGroupId: { type: integer }
      responses:
        "200":
          description: Merge succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  movedCount: { type: integer }
                  mergedSourceIds:
                    type: array
                    items: { type: integer }
        "404": { description: Target group not found }
        "409": { description: One or more source groups invoiced }

  /umrah/penalties/waive-bulk:
    post:
      operationId: bulkWaiveUmrahPenalties
      tags: [umrah]
      summary: Waive multiple penalties under one reason
      description: |
        Loops each penaltyId through `applyTransition` +
        `postPenaltyWaiverGL`. A single bad row does not break the batch
        — failures + skips are reported back so the UI can render a
        non-atomic summary. Posts one consolidated reversal journal
        entry per successful row.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [penaltyIds, reason]
              properties:
                penaltyIds:
                  type: array
                  items: { type: integer }
                reason: { type: string }
      responses:
        "200":
          description: Bulk waive result
          content:
            application/json:
              schema:
                type: object
                properties:
                  successCount: { type: integer }
                  successIds:
                    type: array
                    items: { type: integer }
                  totalWaivedAmount: { type: number }
                  skipped:
                    type: array
                    items: { type: object }
                  errors:
                    type: array
                    items: { type: object }

  /umrah/attachments:
    get:
      operationId: listUmrahAttachments
      tags: [umrah]
      summary: List polymorphic attachments
      security: [{ bearerAuth: [] }]
      parameters:
        - name: entityType
          in: query
          schema:
            type: string
            enum: [mutamer, sub_agent, group, agent, nusk_invoice, season, sales_invoice, violation]
        - name: entityId
          in: query
          schema: { type: integer }
        - name: type
          in: query
          schema:
            type: string
            enum: [passport, visa, contract, nusk_file, identity, transfer_receipt, other]
      responses:
        "200":
          description: Filtered attachment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
    post:
      operationId: createUmrahAttachment
      tags: [umrah]
      summary: Attach a file to an umrah entity
      description: |
        Verifies ownership of the target row via an entityType→table
        whitelist before insert (no raw table-name injection). The
        attached file is described by metadata only; uploads go through
        the central storage service and `storageKey` + `fileUrl` are
        recorded here.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entityType, entityId, type, title]
              properties:
                entityType: { type: string }
                entityId: { type: integer }
                type: { type: string }
                title: { type: string }
                notes: { type: string }
                fileUrl: { type: string, format: uri }
                storageKey: { type: string }
                fileSize: { type: integer }
                mimeType: { type: string }
      responses:
        "201":
          description: Attachment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
        "404": { description: Owning entity not found }

  /umrah/attachments/{id}:
    delete:
      operationId: deleteUmrahAttachment
      tags: [umrah]
      summary: Soft-delete an attachment
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404": { description: Attachment not found }

  /umrah/agents/{id}:
    get:
      operationId: getUmrahAgent
      tags: [umrah]
      summary: Get an umrah agent by ID (full row + statement aggregates)
      description: |
        Detail-page payload: the full `umrah_agents` row plus the statement
        aggregates the detail pane renders (pilgrim count, overstayed count,
        total invoiced/paid/outstanding, and a per-status breakdown dict).
        Every column is enumerated rather than passthrough so the
        contract-drift guard fires on any added/renamed returned field.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UmrahAgentDetail"
        "404": { description: Agent not found }

  /umrah/groups/{id}:
    get:
      operationId: getUmrahGroup
      tags: [umrah]
      summary: Get an umrah group by ID (full row + roster + aggregates)
      description: |
        Detail-page payload: the full `umrah_groups` row joined with the
        agent/sub-agent/season names, the pilgrim roster summary, a per-status
        breakdown dict, exemption/visa-expiring counts, and nested finance
        (invoice/NUSK totals + margin) and schedule (date range + flight
        codes) objects. Every column is enumerated so the contract-drift
        guard fires on any added/renamed returned field.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Group details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UmrahGroupDetail"
        "404": { description: Group not found }

  /umrah/pilgrims/{id}:
    get:
      operationId: getUmrahPilgrim
      tags: [umrah]
      summary: Get an umrah pilgrim by ID (decrypted row + penalties)
      description: |
        Detail-page payload: the full `umrah_pilgrims` row (sensitive
        passport/visa/border/mofa fields decrypted, plus their `*_hash`
        lookup columns) joined with the agent/package/season/group/sub-agent
        names, followed by the pilgrim's penalty rows. Every column is
        enumerated so the contract-drift guard fires on any added/renamed
        returned field.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Pilgrim details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UmrahPilgrimDetail"
        "404": { description: Pilgrim not found }

  /support/tickets/{id}:
    get:
      operationId: getSupportTicket
      tags: [support]
      summary: Get a support ticket by ID (full row + replies + SLA)
      description: |
        Detail-page payload: the full `support_tickets` row joined with the
        client name, the reply thread, and the computed SLA fields
        (`isSlaBreached` boolean + `slaRemainingHours` string). Every column
        is enumerated so the contract-drift guard fires on any added/renamed
        returned field.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Ticket details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketDetail"
        "404": { description: Ticket not found }

  /properties/units/{id}:
    get:
      operationId: getPropertyUnit
      tags: [properties]
      summary: Get a property unit by ID (full row + related collections)
      description: |
        Detail-page payload: the full `property_units` row plus the related
        contracts, payments, maintenance requests, and an activity timeline.
        Every column is enumerated so the contract-drift guard fires on any
        added/renamed returned field.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Unit details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyUnitDetail"
        "404": { description: Unit not found }

  /finance/journal/{id}:
    get:
      operationId: getJournalEntry
      tags: [finance]
      summary: Get a journal entry by ID (full row + lines + reversal links)
      description: |
        Detail-page payload: the full `journal_entries` row plus the
        reversal-link reference/description fields, the entry's lines (each
        the full `journal_lines` row joined with the account name), and the
        nested `reversalOf` / `reversedBy` linked-entry objects (null when not
        a reversal). Every column is enumerated so the contract-drift guard
        fires on any added/renamed returned field.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Journal entry details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntryDetail"
        "404": { description: Journal entry not found }

  /umrah/sub-agents/{id}:
    get:
      operationId: getUmrahSubAgent
      tags: [umrah]
      summary: Get a sub-agent by ID (full row + statement aggregates)
      description: |
        Detail-page payload: the full `umrah_sub_agents` row joined with
        the linked agent / client names, plus the statement aggregates
        the detail pane renders (pilgrim count, overstayed count, total
        paid, and a per-status breakdown dict).
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Sub-agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UmrahSubAgentDetail"
        "404": { description: Sub-agent not found }

  /umrah/statements/{subAgentId}:
    get:
      operationId: umrahSubAgentStatement
      tags: [umrah]
      summary: Sub-agent statement of account (JSON)
      description: |
        Running-balance ledger (opening balance, dated debit/credit
        entries for invoices + violations + payments, closing balance).
        Defaults to the detailed view; `?type=summary` collapses to a
        monthly roll-up. JSON peer of the printable
        `/umrah/statements/{subAgentId}/pdf`.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: subAgentId
          in: path
          required: true
          schema: { type: integer }
        - name: type
          in: query
          schema: { type: string, enum: [detailed, summary] }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Statement payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UmrahSubAgentStatement"

  /umrah/reports/reconciliation:
    get:
      operationId: umrahReconciliationReport
      tags: [umrah]
      summary: NUSK file ↔ system reconciliation
      description: |
        Read-only diff across three dimensions:
          1. amountDiffs — nuskInvoice.totalAmount vs posted JE total
          2. countDiffs — nuskInvoice.mutamerCount vs actual pilgrims
          3. overstayGaps — pilgrims with overstayDays>0 and no open
             violation row
      security: [{ bearerAuth: [] }]
      parameters:
        - name: seasonId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Reconciliation findings
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                  amountDiffs: { type: array, items: { type: object } }
                  countDiffs:  { type: array, items: { type: object } }
                  overstayGaps: { type: array, items: { type: object } }

  /umrah/reports/daily-runsheet:
    get:
      operationId: umrahDailyRunsheet
      tags: [umrah]
      summary: Daily operations run-sheet (JSON)
      description: |
        Returns arrivals + departures for a given date plus everyone
        currently overstaying. Defaults to today (ISO yyyy-mm-dd).
        Companion PDF at `/umrah/reports/daily-runsheet/pdf`.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: date
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Run-sheet payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  date: { type: string, format: date }
                  arrivals: { type: array, items: { type: object } }
                  departures: { type: array, items: { type: object } }
                  overstays: { type: array, items: { type: object } }

  /umrah/reports/daily-runsheet/pdf:
    get:
      operationId: umrahDailyRunsheetPdf
      tags: [umrah]
      summary: Daily operations run-sheet (Arabic PDF)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: date
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /umrah/statements/{subAgentId}/pdf:
    get:
      operationId: umrahSubAgentStatementPdf
      tags: [umrah]
      summary: Sub-agent statement of account (Arabic PDF)
      description: |
        Detailed running-balance ledger (invoices + violations + payments
        with opening + closing balance), rendered as a printable PDF for
        WhatsApp / email / hand delivery.
      security: [{ bearerAuth: [] }]
      parameters:
        - name: subAgentId
          in: path
          required: true
          schema: { type: integer }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
        redisRateLimit:
          type: string
      required: [status]

    HealthSchemaStatus:
      type: object
      description: |
        Response from `GET /api/health/schema`. `status` is the readiness
        verdict (`ok` | `degraded` | `critical`). `tables` and `migrations`
        carry diagnostic detail whose internal shape is intentionally left
        open (bare object) to avoid forcing spec churn on every change to
        the readiness check.
      properties:
        status:
          type: string
        tables:
          type: object
        migrations:
          type: object
        checkedAt:
          type: string
          format: date-time
      required: [status, checkedAt]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        assignments:
          type: array
          items:
            type: object
        userRoles:
          type: array
          items:
            type: object
      required: [assignments, userRoles]

    MobileTokenPair:
      type: object
      description: Access + refresh token pair returned in the body for mobile clients.
      properties:
        tokenType:
          type: string
          enum: [Bearer]
        accessToken:
          type: string
          description: "Short-lived JWT — send as `Authorization: Bearer <accessToken>`."
        refreshToken:
          type: string
          description: Long-lived opaque token used to obtain a new pair via /auth/mobile/refresh.
        accessTokenExpiresIn:
          type: integer
          description: Access-token lifetime in seconds.
        refreshTokenExpiresIn:
          type: integer
          description: Refresh-token lifetime in seconds.
      required:
        [tokenType, accessToken, refreshToken, accessTokenExpiresIn, refreshTokenExpiresIn]

    MobileAuthResponse:
      allOf:
        - $ref: "#/components/schemas/MobileTokenPair"
        - type: object
          properties:
            assignments:
              type: array
              items:
                type: object
            userRoles:
              type: array
              items:
                type: object
          required: [assignments, userRoles]

    MobileRefreshBody:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        empNumber:
          type: string
          nullable: true
        photoUrl:
          type: string
          nullable: true
        status:
          type: string
        jobTitle:
          type: string
          nullable: true
        jobTitleId:
          type: integer
          nullable: true
        role:
          type: string
        salary:
          type: string
          nullable: true
        companyId:
          type: integer
        branchId:
          type: integer
          nullable: true
        companyName:
          type: string
          nullable: true
        branchName:
          type: string
          nullable: true
        preferredCalendar:
          type: string
          nullable: true
        preferredLocale:
          type: string
          nullable: true
        userRoles:
          type: array
          items:
            type: object
      required: [id, name, role, companyId, userRoles]

    DashboardData:
      type: object
      properties:
        cards:
          type: object
          properties:
            todayTasks:
              type: integer
            awaitingMe:
              type: integer
            overdue:
              type: integer
            completedToday:
              type: integer
            completedPct:
              type: integer
            total:
              type: integer
        todayTasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        pendingApprovals:
          type: array
          items:
            type: object
        pendingFinanceApprovals:
          type: array
          items:
            type: object
        pendingPurchaseRequests:
          type: array
          items:
            type: object
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        role:
          type: string
      required: [cards, todayTasks, pendingApprovals, notifications]

    DashboardSummary:
      type: object
      properties:
        totalEmployees:
          type: integer
        totalClients:
          type: integer
        totalRevenue:
          type: number
        pendingInvoices:
          type: integer
        activeTasksToday:
          type: integer
        presentToday:
          type: integer
        vehicles:
          type: object
          properties:
            total:
              type: integer
            active:
              type: integer
        tickets:
          type: object
          properties:
            open:
              type: integer
            breached:
              type: integer
        projects:
          type: object
          properties:
            total:
              type: integer
            active:
              type: integer
        contracts:
          type: object
          properties:
            active:
              type: integer
            expiringSoon:
              type: integer
        opportunities:
          type: object
          properties:
            total:
              type: integer
            value:
              type: number
        warehouseAlerts:
          type: integer
        pendingLeaveRequests:
          type: integer
        umrah:
          type: object
          properties:
            activePilgrims:
              type: integer
            overstayPilgrims:
              type: integer
            openSeasons:
              type: integer
            monthlyRevenue:
              type: number
            pendingInvoices:
              type: integer
            openPenalties:
              type: integer
      required: [totalEmployees, totalClients, totalRevenue, pendingInvoices, activeTasksToday, presentToday]

    Employee:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        empNumber:
          type: string
          nullable: true
        status:
          type: string
        activeAssignmentId:
          type: integer
          nullable: true
