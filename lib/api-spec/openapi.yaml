openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Ghayth ERP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: dashboard
  - name: employees
  - name: clients
  - name: hr
  - name: finance
  - name: notifications
  - name: tasks
  - name: projects
    description: |
      Projects domain — owns the `projects` table.
      Project creation MUST go through `POST /api/projects` (this tag).
      Finance UI screens (e.g. `project-costing`) must NOT call any
      `POST /api/finance/projects*` endpoint to create a project — that
      route was removed because it bypassed the projects domain
      (RBAC `projects.list:create`, manager assignment, delivery
      obligation registration, `project.created` event, audit log).
      Finance may freely call the read-side `GET /api/finance/projects*`
      and the costing endpoints `POST /api/finance/projects/:id/costs`.
  - name: umrah
    description: |
      Umrah workflow — pilgrimage operations.
      Only the endpoints introduced in PRs #303/#305/#306/#312/#318 are
      enumerated below; the legacy `/api/umrah/*` surface is large and
      will be back-filled in per-module follow-up PRs.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Liveness probe (lightweight)
      description: |
        Lightweight liveness check. Proves the process is up. Does NOT
        verify DB connectivity or schema completeness — use
        `GET /api/health/schema` for readiness verification.
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /health/schema:
    get:
      operationId: healthSchema
      tags: [health]
      summary: Schema/readiness verification
      description: |
        Readiness probe. Verifies that the expected tables/columns exist
        and that pending migrations have been applied. This is the
        endpoint that post-deploy verification scripts should poll —
        `/api/health` and `/api/healthz` only prove connectivity /
        liveness, not schema completeness.
      responses:
        "200":
          description: Schema reachable (see `ok` field for readiness verdict)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSchemaStatus"

  # ─── Auth ──────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /auth/mobile/login:
    post:
      operationId: mobileLogin
      tags: [auth]
      summary: Mobile (Bearer-token) login
      description: >
        Employee login for native/mobile clients. Returns the access and
        refresh tokens in the JSON body (NOT as cookies). The access token is
        the same JWT used by the web cookie flow, so it carries identical
        RBAC / allowedModules / feature-flag scope — send it as
        `Authorization: Bearer <accessToken>` on subsequent requests. When the
        access token expires (HTTP 401), call `/auth/mobile/refresh` with the
        stored refresh token to obtain a new pair. To sign out, POST the
        refresh token to `/auth/logout`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful — tokens returned in body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileAuthResponse"
        "403":
          description: Invalid credentials, suspended account, or no active assignment
        "429":
          description: Account locked due to too many failed login attempts

  /auth/mobile/refresh:
    post:
      operationId: mobileRefresh
      tags: [auth]
      summary: Mobile refresh-token rotation
      description: >
        Exchanges a valid refresh token for a new access + refresh token pair
        (returned in the body). Refresh tokens are rotated on every use;
        re-using an already-rotated token revokes the entire session
        (reuse detection).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileRefreshBody"
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileTokenPair"
        "403":
          description: Invalid, expired, or revoked refresh token

  # ─── Dashboard ─────────────────────────────────────────────
  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard stats
      security: [{ bearerAuth: [] }]
