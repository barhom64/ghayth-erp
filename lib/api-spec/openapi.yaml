          items:
            type: object
            additionalProperties: true
        attendance:
          type: array
          items:
            type: object
            additionalProperties: true
        leaves:
          type: array
          items:
            type: object
            additionalProperties: true
        trainings:
          type: array
          items:
            type: object
            additionalProperties: true
        payroll:
          type: array
          items:
            type: object
            additionalProperties: true
        violations:
          type: array
          items:
            type: object
            additionalProperties: true
        loans:
          type: array
          items:
            type: object
            additionalProperties: true
        overtime:
          type: array
          items:
            type: object
            additionalProperties: true
        userAccount:
