        sponsorNumber: { type: ["string", "null"] }
        workPermitNumber: { type: ["string", "null"] }
        workPermitExpiry: { type: ["string", "null"] }
        iqamaStatus: { type: ["string", "null"] }
        assignmentId: { type: ["integer", "null"] }
        jobTitle: { type: string }
